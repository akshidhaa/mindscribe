<!DOCTYPE html>
<html>
<head>
  <title>MINDSCRIBE Challenges</title>
  <style>
    body { font-family: "Segoe UI", Arial; background:#f9f9f9; padding:20px; }
    .challenge { background:white; padding:15px; margin:10px 0; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
    .challenge h3 { margin:0; color:#2e7d32; }
  </style>
</head>
<body>
  <h1>Daily Challenges</h1>

  <div class="challenge">
    <h3>🌞 Morning Reflection</h3>
    <p>Write one positive thought to start your day.</p>
    <input type="checkbox"> Mark as done
  </div>

  <div class="challenge">
    <h3>💧 Hydration Check</h3>
    <p>Drink at least 6–8 glasses of water today.</p>
    <input type="checkbox"> Mark as done
  </div>

  <div class="challenge">
    <h3>🤝 Connection</h3>
    <p>Send a supportive message to a friend or community member.</p>
    <input type="checkbox"> Mark as done
  </div>

  <button onclick="window.location.href='index.html'">⬅ Back to Dashboard</button>
</body>
</html>
